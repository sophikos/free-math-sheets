<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <linearGradient id="bookLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Open book -->
  <!-- Left page -->
  <path d="M 160,145 C 140,140 100,138 60,142 L 60,90 C 100,86 140,88 160,93 Z"
        fill="white" stroke="#2563eb" stroke-width="2" />
  <!-- Right page -->
  <path d="M 160,145 C 180,140 220,138 260,142 L 260,90 C 220,86 180,88 160,93 Z"
        fill="white" stroke="#2563eb" stroke-width="2" />
  <!-- Left cover -->
  <path d="M 60,90 C 100,86 140,88 160,93 L 160,145 C 140,140 100,138 60,142 Z"
        fill="none" stroke="url(#bookLeft)" stroke-width="2.5" />
  <path d="M 58,91 L 58,144 L 60,142 L 60,90 Z" fill="#1e40af" />
  <!-- Right cover -->
  <path d="M 260,90 C 220,86 180,88 160,93 L 160,145 C 180,140 220,138 260,142 Z"
        fill="none" stroke="url(#bookRight)" stroke-width="2.5" />
  <path d="M 262,91 L 262,144 L 260,142 L 260,90 Z" fill="#3b82f6" />
  <!-- Spine -->
  <line x1="160" y1="93" x2="160" y2="145" stroke="#1e40af" stroke-width="2" />
  <!-- Page lines left -->
  <line x1="80" y1="103" x2="145" y2="100" stroke="#cbd5e1" stroke-width="1" />
  <line x1="80" y1="113" x2="145" y2="110" stroke="#cbd5e1" stroke-width="1" />
  <line x1="80" y1="123" x2="145" y2="120" stroke="#cbd5e1" stroke-width="1" />
  <!-- Page lines right -->
  <line x1="175" y1="100" x2="245" y2="103" stroke="#cbd5e1" stroke-width="1" />
  <line x1="175" y1="110" x2="245" y2="113" stroke="#cbd5e1" stroke-width="1" />
  <line x1="175" y1="120" x2="245" y2="123" stroke="#cbd5e1" stroke-width="1" />

  <!-- Floating math symbols -->
  <!-- Plus -->
  <g transform="translate(100, 50)" fill="#f59e0b">
    <rect x="-2" y="-10" width="4" height="20" rx="1" />
    <rect x="-10" y="-2" width="20" height="4" rx="1" />
  </g>

  <!-- Division sign -->
  <g transform="translate(140, 28)" fill="#10b981">
    <circle cx="0" cy="-7" r="3" />
    <rect x="-8" y="-1.5" width="16" height="3" rx="1" />
    <circle cx="0" cy="7" r="3" />
  </g>

  <!-- Pi symbol -->
  <g transform="translate(170, 44)" fill="none" stroke="#e11d48" stroke-width="3" stroke-linecap="round">
    <line x1="-12" y1="-8" x2="12" y2="-8" />
    <path d="M -5,-8 C -5,0 -7,8 -9,14" />
    <line x1="5" y1="-8" x2="5" y2="14" />
  </g>

  <!-- Equals sign -->
  <g transform="translate(210, 30)" fill="#7c3aed">
    <rect x="-8" y="-5" width="16" height="3" rx="1" />
    <rect x="-8" y="2" width="16" height="3" rx="1" />
  </g>

  <!-- Sigma / summation -->
  <g transform="translate(240, 56)" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="10,-12 -6,-12 4,0 -6,12 10,12" />
  </g>

  <!-- Square root -->
  <g transform="translate(120, 68)" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-4,-2 0,-2 4,10 14,-12 22,-12" />
  </g>

  <!-- Infinity -->
  <g transform="translate(205, 66)">
    <path d="M 0,0 C 4,-8 12,-8 14,0 C 16,8 8,8 0,0 C -4,-8 -12,-8 -14,0 C -16,8 -8,8 0,0"
          fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Small decorative dots (like particles rising) -->
  <circle cx="130" cy="76" r="1.5" fill="#2563eb" opacity="0.4" />
  <circle cx="155" cy="68" r="1" fill="#f59e0b" opacity="0.5" />
  <circle cx="185" cy="72" r="1.5" fill="#10b981" opacity="0.4" />
  <circle cx="228" cy="74" r="1" fill="#e11d48" opacity="0.5" />

  <!-- Text -->
  <text x="160" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1e3a5f">
    Free Math Sheets
  </text>
  <text x="160" y="198" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" letter-spacing="2">PRACTICE MAKES PROGRESS</text>
</svg>
